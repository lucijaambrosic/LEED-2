    <!-- Option 1 -->
    <div style="background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #eee; margin-bottom: 1rem;">
        <label><input type="checkbox" id="option1"> <strong>Option 1. Surrounding density (2-4 points)</strong></label>
        <div id="option1-details" class="hidden" style="margin-left: 2rem; margin-top: 1rem;">
            <p>Upload a scaled area plan or map showing the project site...</p>
            <a href="https://www.dropbox.com/scl/fo/1zot08b3vq5j4klbm4t74/ACCW7duarFj6vOVyEnOD-GA?rlkey=t6aux1rb4z7zg2bu2pa8oq11a&st=xurijisi&dl=0" target="_blank" class="btn-add-file">Add file</a>
            <div style="margin-top: 1rem;">
                <label><input type="radio" name="dt" id="separate"> Separate densities</label>
                <label style="margin-left: 1rem;"><input type="radio" name="dt" id="combined"> Combined densities</label>
            </div>
            <div id="sep-ui" class="hidden">
                <h3>Separate Densities</h3>
                <table>
                    <tr><td>Mixed-use (Res)</td><td><input type="number"></td></tr>
                    <tr><td>Mixed-use (Non-res)</td><td><input type="number"></td></tr>
                </table>
            </div>
            <div id="comb-ui" class="hidden">
                <h3>Combined Densities</h3>
                <table>
                    <tr><td>Total building area</td><td><input type="number"></td></tr>
                </table>
            </div>
        </div>
    </div>

    <!-- Option 2 -->
    <div style="background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #eee;">
        <label><input type="checkbox" id="option2"> <strong>Option 2. Diverse uses (1-2 points)</strong></label>
        <div id="option2-details" class="hidden" style="margin-left: 2rem; margin-top: 1rem;">
            <table>
                <thead><tr><th>Label</th><th>Name</th><th>Category</th><th>Type</th><th>Dist</th><th><button onclick="addRow()">+</button></th></tr></thead>
                <tbody id="diverseBody"></tbody>
            </table>
            <a href="https://www.dropbox.com/scl/fo/1zot08b3vq5j4klbm4t74/ACCW7duarFj6vOVyEnOD-GA?rlkey=t6aux1rb4z7zg2bu2pa8oq11a&st=m5ulg9ts&dl=0" target="_blank" class="btn-add-file" style="margin-top:1rem;">Add file</a>
        </div>
    </div>
</div>

<script>
    const useData = { "Food retail": ["Supermarket", "Grocery"], "Services": ["Bank", "Gym"] };
    const o1 = document.getElementById('option1');
    const o2 = document.getElementById('option2');
    const sep = document.getElementById('separate');
    const comb = document.getElementById('combined');
    
    o1.onchange = () => document.getElementById('option1-details').classList.toggle('hidden', !o1.checked);
    o2.onchange = () => {
        document.getElementById('option2-details').classList.toggle('hidden', !o2.checked);
        if(o2.checked && !document.getElementById('diverseBody').children.length) addRow();
    };
    sep.onchange = () => { document.getElementById('sep-ui').classList.remove('hidden'); document.getElementById('comb-ui').classList.add('hidden'); };
    comb.onchange = () => { document.getElementById('comb-ui').classList.remove('hidden'); document.getElementById('sep-ui').classList.add('hidden'); };

    function addRow() {
        const row = document.createElement('tr');
        row.innerHTML = `<td><input></td><td><input></td><td><select onchange="fill(this)"><option disabled selected>Cat</option>${Object.keys(useData).map(c=>`<option>${c}</option>`)}</select></td><td><select></select></td><td><input type="number"></td><td><button onclick="this.parentElement.parentElement.remove()">-</button></td>`;
        document.getElementById('diverseBody').appendChild(row);
    }
    function fill(sel) {
        const s2 = sel.parentElement.nextElementSibling.children[0];
        s2.innerHTML = useData[sel.value].map(t=>`<option>${t}</option>`).join('');
    }
</script>
